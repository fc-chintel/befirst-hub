# GitHubに公開したあと、1日4回(日本時間 6時/12時/18時/24時ごろ)
# 自動でニュースと動画データを更新してくれる仕組みです。
# GitHubにアップロードするだけで動き始めます(設定変更は不要)。
name: データ自動更新

on:
  schedule:
    - cron: "0 21,3,9,15 * * *" # UTC表記。日本時間の6・12・18・24時
  workflow_dispatch: # 手動実行ボタンも使えるようにする

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: RSSから最新データを取得
        run: node scripts/update-data.mjs

      - name: 変更があればコミット
        run: |
          git config user.name "bfhub-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "データ自動更新"
          git push
